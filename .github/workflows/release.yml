name: Release

on:
  push:
    tags: ['v*']

# Top-level permissions are read-only. Each job that needs a write
# privilege declares the minimum scope it needs (publish → packages +
# id-token + attestations; publish-chart → packages + id-token; release
# → contents:write to create the GitHub release). Closes Scorecard
# TokenPermissionsID alerts #2 + #3 (issue #27).
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/elevarq/arq-signals
  # Docker Hub mirror. Publishing is opt-in: when DOCKERHUB_USERNAME
  # is unset the Docker Hub login + push steps no-op so the release
  # still succeeds (e.g. on forks without the secret configured).
  # `elevarq/arq-signals` matches the GHCR slug; if a different
  # Docker Hub repo name is desired, change DOCKERHUB_IMAGE here.
  DOCKERHUB_IMAGE: elevarq/arq-signals
  # Opt every JavaScript-based action into the Node.js 24 runtime
  # ahead of GitHub's 2026-06-02 forced switch (Node 20 is removed
  # 2026-09-16). See #192.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Gate A: Correctness ───────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG contains this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "STOP: CHANGELOG.md has no entry for version ${VERSION}"
            exit 1
          fi
          echo "CHANGELOG entry found for ${VERSION}"

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "1.25"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Boundary tests
        run: >
          go test -v -run
          'TestNoAnalyzerImports|TestNoLLMCode|TestNoScoringCode|TestNoProprietaryContent|TestLicenseFileExists'
          ./tests/

  # ── Gate B: Lint / Quality ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ── Gate C: Security ──────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Build image for scanning
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg COMMIT="${COMMIT}" \
            --build-arg DATE="${DATE}" \
            -t arq-signals:scan .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: arq-signals:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # Use the gitleaks binary directly rather than the now-paywalled
      # gitleaks/gitleaks-action wrapper. Same tool, same scan, no
      # licensing surface. Matches the approach in ci.yml so the two
      # workflows stay consistent. Tarball download is verified
      # against the upstream-published SHA256SUMS file from the same
      # release so a swapped binary fails the pipeline before it can
      # run a scan.
      - name: Install gitleaks (checksum-verified)
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -sSfLo "$tmp/$TARBALL"          "$BASE/$TARBALL"
          curl -sSfLo "$tmp/checksums.txt"     "$BASE/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          (cd "$tmp" && grep "  $TARBALL\$" checksums.txt | sha256sum -c -)
          tar -xzf "$tmp/$TARBALL" -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks detect
        run: gitleaks detect --source . --verbose --exit-code 1

  # ── Gate D + E: Build, Sign & Publish ─────────────────────────────────
  publish:
    name: Publish to GHCR
    needs: [validate, test, lint, security-scan]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write      # docker login + push to ghcr.io/elevarq/arq-signals
      id-token: write      # cosign keyless OIDC + SLSA provenance
      attestations: write  # buildkit SBOM + SLSA attestations attached to the image
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # QEMU is required so buildx can produce arm64 layers on an amd64
      # runner — Go cross-compiles natively, but Alpine apk add and
      # adduser in the runtime stage execute on each target arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub login is opt-in (skipped when DOCKERHUB_USERNAME
      # isn't configured — e.g. forks or pre-credential-setup runs).
      # The metadata-action below also emits Docker Hub tags only
      # when this login succeeded; otherwise the push step pushes
      # to GHCR only.
      - name: Check Docker Hub credentials available
        id: dockerhub-check
        run: |
          if [[ -n "${{ secrets.DOCKERHUB_USERNAME }}" && -n "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set — Docker Hub publishing skipped; GHCR still publishes."
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub-check.outputs.available == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub-check.outputs.available == 'true' && env.DOCKERHUB_IMAGE || '' }}
          # latest=auto: only the highest non-pre-release semver also
          # gets the floating `latest` tag. Pre-releases (vX.Y.Z-rc.1)
          # never overwrite latest. `latest` is produced by CI only —
          # never pushed manually.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # OCI annotations land on the image manifest. metadata-action
          # sets a baseline (source, revision, created); the explicit
          # labels below add the rest of the org.opencontainers.image.*
          # set so consumers can identify the build without pulling.
          labels: |
            org.opencontainers.image.title=arq-signals
            org.opencontainers.image.description=Open-source PostgreSQL diagnostic signal collector — local-first, no data egress.
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.vendor=Elevarq
            org.opencontainers.image.documentation=https://github.com/Elevarq/Arq-Signals/blob/main/README.md

      - name: Build and push (multi-arch + SBOM + SLSA provenance)
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          # Multi-arch manifest list. Buildx produces both per-arch
          # images and publishes a single manifest list at the digest;
          # `docker pull` auto-selects by host platform.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          # Registry-attached SBOM: buildkit generates a per-platform
          # SPDX SBOM and pushes it as an OCI attestation referenced
          # from the image digest. Consumers retrieve it with
          # `cosign download sbom <image>` (or `docker buildx
          # imagetools inspect --format '{{json .SBOM}}'`).
          sbom: true
          # SLSA build provenance attestation, mode=max. Records the
          # builder identity, source materials, build parameters, and
          # output digests in an in-toto statement attached to the
          # image. Verifiable with `cosign verify-attestation
          # --type slsaprovenance ...`.
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      # Keyless signing: sigstore Fulcio issues a short-lived
      # certificate bound to this workflow's GitHub OIDC identity. No
      # long-lived signing key is stored anywhere. Verification at
      # consumption time binds the signature back to the workflow ref
      # via the certificate identity (see docs/release-verification.md).
      #
      # Sign in both GHCR and Docker Hub (when the latter is wired).
      # The manifest digest is identical across registries (same
      # image bytes), but cosign attaches signatures next to the
      # image in its own registry — consumers pulling from Docker
      # Hub need a signature in Docker Hub.
      - name: Sign image in GHCR (cosign keyless)
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Sign image in Docker Hub (cosign keyless)
        if: steps.dockerhub-check.outputs.available == 'true'
        run: cosign sign --yes ${{ env.DOCKERHUB_IMAGE }}@${{ steps.push.outputs.digest }}

      # The release also publishes a downloadable SPDX SBOM file as a
      # workflow artifact. This is independent of the registry-attached
      # SBOM (sbom: true above) — the file artifact lets consumers
      # download the SBOM without pulling the image at all.
      - name: Generate SBOM artifact (file)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom
          path: sbom.spdx.json

      # #165: cosign-attest the SBOM as an in-toto SPDX predicate
      # tied to the image digest. buildkit's `sbom: true` attaches
      # an SBOM as an OCI artefact, but that attachment is signed
      # by the buildkit attestation chain — not by cosign's
      # keyless OIDC identity. Re-attesting with cosign binds the
      # SBOM to THIS workflow's GitHub Actions OIDC identity, so
      # consumers running `cosign verify-attestation --type spdxjson`
      # get the same trust root they use for the image signature.
      #
      # Use --type=spdxjson, NOT --type=spdx: `spdx` is the SPDX
      # tag-value plaintext format; `spdxjson` is the JSON form
      # that syft produces. v0.7.0 used `spdx` by mistake, which
      # caused cosign to embed the JSON file as a JSON-encoded
      # string in the predicate field — verify-attestation then
      # rejected the attestation with a proto syntax error. The
      # in-toto envelope was structurally valid (subject,
      # predicateType, OIDC-bound signature all correct), but
      # the predicate object was double-encoded. Bumped here so
      # the next tag verifies cleanly with stock cosign.
      - name: Attest SBOM in GHCR (cosign keyless)
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom.spdx.json \
            ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Attest SBOM in Docker Hub (cosign keyless)
        if: steps.dockerhub-check.outputs.available == 'true'
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom.spdx.json \
            ${{ env.DOCKERHUB_IMAGE }}@${{ steps.push.outputs.digest }}

  # ── Gate E (chart): Publish Helm chart as an OCI artifact ─────────────
  # Parity with the container image: the chart is pushed to GHCR as an
  # OCI artifact so it installs by reference without a repo checkout:
  #   helm install arq-signals oci://ghcr.io/elevarq/charts/arq-signals \
  #     --version <X.Y.Z>
  # The chart version is stamped from the release tag at package time, so
  # the published chart can never drift from the release even if the
  # committed Chart.yaml lags. See #3.
  publish-chart:
    name: Publish Helm chart (OCI)
    needs: [validate, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write  # helm registry login + push to ghcr.io/elevarq/charts
      id-token: write  # cosign keyless OIDC for the chart signature
    env:
      CHART_REGISTRY: oci://ghcr.io/elevarq/charts
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5
        with:
          version: v3.16.4

      - name: Lint chart
        run: helm lint deploy/helm/arq-signals

      - name: Log in to GHCR (helm registry)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart (version stamped from tag)
        id: package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          helm package deploy/helm/arq-signals \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination dist-chart
          echo "file=dist-chart/arq-signals-${VERSION}.tgz" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        id: push
        run: |
          # `helm push` prints the pushed digest to stderr; capture the
          # whole stream so the cosign step can sign the exact digest.
          helm push "${{ steps.package.outputs.file }}" "${CHART_REGISTRY}" 2>&1 | tee push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -1)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      # cosign reads the docker keychain (~/.docker/config.json) when
      # pushing the signature; helm registry login above writes only to
      # helm's config, so cosign sees no credentials and 401s. Mirror the
      # image-publish pattern: docker/login-action before cosign sign.
      # Issue #50.
      - name: Log in to GHCR (docker keychain for cosign)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Keyless signing, same trust root as the container image: the
      # signature binds back to this workflow's GitHub OIDC identity.
      - name: Sign chart (cosign keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/elevarq/charts/arq-signals@${{ steps.push.outputs.digest }}"

  # ── Go binary artifacts ───────────────────────────────────────────────
  build-binaries:
    name: Build Go Binaries
    needs: [validate, test, security-scan]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          LDFLAGS="-X github.com/elevarq/arq-signals/internal/safety.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/elevarq/arq-signals/internal/safety.Commit=${GITHUB_SHA::8}"
          LDFLAGS="${LDFLAGS} -X github.com/elevarq/arq-signals/internal/safety.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o "dist/arq-signals-${GOOS}-${GOARCH}" ./cmd/arq-signals
          go build -ldflags "${LDFLAGS}" -o "dist/arqctl-${GOOS}-${GOARCH}" ./cmd/arqctl

      - name: Upload binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ── Gate F: Release ───────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [validate, publish, build-binaries]
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # softprops/action-gh-release creates the GitHub Release + uploads assets
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom

      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
          fi
          cat >> release-notes.md <<EOF

          ---

          ## Supply chain

          - Images (same manifest digest in both registries):
            - GHCR: \`${{ env.IMAGE_NAME }}:${VERSION}\`
            - Docker Hub: \`${{ env.DOCKERHUB_IMAGE }}:${VERSION}\` (when configured)
          - Digest: \`${{ needs.publish.outputs.digest }}\`
          - Architectures: \`linux/amd64\`, \`linux/arm64\`
          - Cosign-signed in both registries (keyless, GitHub OIDC)
          - SBOM attached as OCI attestation **and** as \`sbom.spdx.json\` release asset
          - SLSA build provenance attestation (\`mode=max\`)

          Quick signature verification (GHCR):
          \`\`\`bash
          cosign verify ${{ env.IMAGE_NAME }}:${VERSION} \
            --certificate-identity-regexp='github.com/Elevarq/Arq-Signals/.github/workflows/release.yml@' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          \`\`\`

          Same command works against \`${{ env.DOCKERHUB_IMAGE }}:${VERSION}\` — the certificate identity is bound to the workflow, not the registry.

          Full verification checklist (manifest, SBOM, provenance, Trivy):
          [docs/release-verification.md](https://github.com/Elevarq/Arq-Signals/blob/main/docs/release-verification.md)
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          body_path: release-notes.md
          files: |
            sbom.spdx.json
            dist/*
          generate_release_notes: false
          # action-gh-release@v3 stopped auto-detecting pre-release from
          # the semver suffix; declare it explicitly from the tag name so
          # `v*.*.*-beta.N` / `-rc.N` are flagged correctly. Issue #50.
          prerelease: ${{ contains(github.ref_name, '-') }}

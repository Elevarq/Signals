# Local-only Prometheus + Grafana stack for Elevarq Signal /metrics.
#
# This is a developer convenience for kicking the tyres on the
# operational metrics endpoint described in docs/prometheus.md. It is
# NOT a production reference deployment — see docs/grafana-dashboard.md
# for the explicit non-claims.
#
# Usage:
#   docker compose -f examples/observability/docker-compose.yml up
#
# Then browse:
#   - Elevarq Signals API:  http://localhost:8081  (bearer: dev-local-only-replace-in-prod-32chars)
#   - Prometheus:       http://localhost:9090
#   - Grafana:          http://localhost:3000  (admin / admin)

services:
  arq-signals:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      ARQ_SIGNALS_TARGET_HOST: postgres
      ARQ_SIGNALS_TARGET_PORT: "5432"
      ARQ_SIGNALS_TARGET_USER: arq_monitor
      ARQ_SIGNALS_TARGET_DBNAME: postgres
      ARQ_SIGNALS_TARGET_PASSWORD_ENV: PG_PASSWORD
      PG_PASSWORD: monitor_pass
      ARQ_SIGNALS_POLL_INTERVAL: 30s
      ARQ_SIGNALS_API_TOKEN: dev-local-only-replace-in-prod-32chars
      ARQ_SIGNALS_LISTEN_ADDR: "0.0.0.0:8081"
      ARQ_SIGNALS_METRICS_ENABLED: "true"
      ARQ_SIGNALS_METRICS_PATH: "/metrics"
      ARQ_ALLOW_INSECURE_PG_TLS: "true"
      ARQ_ENV: dev
    ports:
      - "8081:8081"
    volumes:
      - signals-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: postgres
    volumes:
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/arq-signals-token:/etc/prometheus/secrets/arq-signals-token:ro
      - prometheus-data:/prometheus
    depends_on:
      - arq-signals

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  signals-data:
  prometheus-data:
  grafana-data:

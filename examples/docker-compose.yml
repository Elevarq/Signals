# arq-signals quick start (LOCAL DEV ONLY)
#
# This compose file is for local development. ARQ_ENV=dev so the
# weak-token rule (#135 / config.WeakAPITokenReason) emits a
# WARNING and lets the deployment start. In ARQ_ENV=prod the same
# token would HARD-FAIL startup. Production deployments MUST mint
# a strong token (e.g. `openssl rand -base64 32`) and supply it
# via ARQ_SIGNALS_API_TOKEN_FILE or a Kubernetes Secret — see
# docs/security/access-control.md.
#
# Start arq-signals alongside a PostgreSQL 16 instance:
#   docker compose -f examples/docker-compose.yml up -d
#
# Trigger a collection (dev-only token shown):
#   curl -X POST http://localhost:8081/collect/now \
#     -H "Authorization: Bearer dev-local-only-replace-in-prod-32chars"
#
# Export snapshots:
#   curl -o snapshot.zip http://localhost:8081/export \
#     -H "Authorization: Bearer dev-local-only-replace-in-prod-32chars"

services:
  arq-signals:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ARQ_SIGNALS_TARGET_HOST: postgres
      ARQ_SIGNALS_TARGET_PORT: "5432"
      ARQ_SIGNALS_TARGET_USER: arq_monitor
      ARQ_SIGNALS_TARGET_DBNAME: postgres
      ARQ_SIGNALS_TARGET_PASSWORD_ENV: PG_PASSWORD
      PG_PASSWORD: monitor_pass
      ARQ_SIGNALS_POLL_INTERVAL: 1m
      # Dev-only API token. The 39-char value passes the #135 strength
      # validator AND is obviously a placeholder. Replace before any
      # production use — see docs/security/access-control.md.
      ARQ_SIGNALS_API_TOKEN: dev-local-only-replace-in-prod-32chars
      # Default listen addr is 127.0.0.1 (safe); in the dev stack we
      # need it reachable via the port mapping, hence 0.0.0.0.
      ARQ_SIGNALS_LISTEN_ADDR: "0.0.0.0:8081"
      ARQ_ALLOW_INSECURE_PG_TLS: "true"
      ARQ_ENV: dev
    ports:
      - "8081:8081"
    volumes:
      - signals-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    # Preload pg_stat_statements so init.sql's CREATE EXTENSION works
    # and the arq-signals pg_stat_statements_v1 / pgss_reset_check_v1
    # collectors can actually read the view.
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  signals-data:

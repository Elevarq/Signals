# Production-style arq-signals deployment.
#
# Connects to an EXISTING PostgreSQL instance. The monitoring-role
# password is delivered via a Docker secret — mounted at
# /run/secrets/pg_password and re-read on every PG connection. It never
# appears in this compose file, in the container environment, in process
# listings, or in container logs.
#
# Rotation is supported: replace the contents of ./secrets/pg_password
# and the next PG connection will pick up the new password. No restart
# required.
#
# --- One-time setup ------------------------------------------------------
#
#   mkdir -p secrets
#   echo -n 'YOUR_MONITOR_PASSWORD' > secrets/pg_password
#   openssl rand -hex 32 > secrets/api_token
#   chmod 600 secrets/pg_password secrets/api_token
#   echo 'secrets/' >> .gitignore     # keep secrets out of version control
#
#   # Copy and edit the target block in signals.yaml to point at your DB:
#   cp examples/signals.yaml examples/signals.prod.yaml
#   # Leave the password source as:
#   #   password_file: /run/secrets/pg_password
#
# --- Start ---------------------------------------------------------------
#
#   docker compose -f examples/docker-compose.prod.yml up -d
#
# --- Use -----------------------------------------------------------------
#
#   TOKEN=$(cat secrets/api_token)
#
#   # Trigger a collection cycle:
#   curl -X POST http://127.0.0.1:8081/collect/now \
#     -H "Authorization: Bearer $TOKEN"
#
#   # Export the latest snapshot as a zip:
#   curl -o snapshot.zip http://127.0.0.1:8081/export \
#     -H "Authorization: Bearer $TOKEN"

services:
  signals:
    image: signals:latest
    # If the image is not yet built locally, uncomment:
    # build:
    #   context: ..
    #   dockerfile: Dockerfile

    environment:
      ARQ_ENV: prod

      # Bind the API to the container's wildcard interface so Docker
      # port-publishing (see `ports:` below) can route host-side
      # 127.0.0.1:8081 to the daemon. The default listen address
      # (loopback inside the container) is unreachable through Docker
      # port publishing, which is why the documented host-side curl
      # / signalsctl flow fails without this override (#206). The host-
      # side safety boundary stays in `ports:` — only 127.0.0.1 on
      # the host is published, so the daemon is still loopback-only
      # from the operator's perspective.
      ARQ_SIGNALS_LISTEN_ADDR: "0.0.0.0:8081"

      # Read the API token from a Docker secret (re-read at startup).
      # A missing or unreadable file is a hard error — the process refuses
      # to start rather than silently falling through to an env value.
      ARQ_SIGNALS_API_TOKEN_FILE: /run/secrets/api_token

      # Structured logs for aggregation
      ARQ_SIGNALS_LOG_JSON: "true"

    secrets:
      - pg_password
      - api_token

    volumes:
      # YAML config is the source of truth for multi-target / TLS-verify /
      # non-trivial setups. arq-signals auto-discovers /etc/arq/signals.yaml.
      - ./signals.prod.yaml:/etc/arq/signals.yaml:ro

      # Persistent local SQLite for snapshot retention.
      - signals-data:/data

      # If your target uses verify-full TLS, mount the CA cert here and
      # reference it from signals.yaml (sslrootcert_file: /etc/arq/ca.crt).
      # - ./secrets/ca.crt:/etc/arq/ca.crt:ro

    ports:
      # Bind to host loopback only — the API must not be public.
      # The container-side bind is 0.0.0.0:8081 (set above via
      # ARQ_SIGNALS_LISTEN_ADDR) so this port mapping has a daemon
      # to forward to. From outside the host the API is unreachable.
      - "127.0.0.1:8081:8081"

    restart: unless-stopped

secrets:
  pg_password:
    file: ./secrets/pg_password
  api_token:
    file: ./secrets/api_token

volumes:
  signals-data:

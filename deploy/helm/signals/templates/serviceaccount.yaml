{{- /*
  #140 — ServiceAccount for the Signals pod.

  Signals does NOT need any Kubernetes API permissions at runtime
  (it doesn't read ConfigMaps, watch Pods, or talk to the
  apiserver). The ServiceAccount exists for:

  1. Least-privilege identity binding — the pod runs under a
     dedicated SA instead of the namespace `default`, which
     prevents accidental permission inheritance from default
     RoleBindings operators may add.
  2. Audit affordance — Kubernetes audit logs name the SA, making
     "what did the Signals pod do" attributable.
  3. Image-pull authorization — when `imagePullSecrets` is set,
     they bind to the SA.

  No Role or ClusterRole is provisioned. If your platform's policy
  requires a Role anchor (e.g. for OPA / Kyverno), add a Role +
  RoleBinding in a separate manifest that selects this SA.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-signals
  labels:
    app.kubernetes.io/name: signals
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}

{{- range $entry := .Values.extraEnv }}
{{- if has $entry.name (list "SIGNALS_ENV" "SIGNALS_POLL_INTERVAL" "SIGNALS_RETENTION_DAYS" "SIGNALS_TARGET_TIMEOUT" "SIGNALS_QUERY_TIMEOUT" "SIGNALS_LISTEN_ADDR" "PG_PASSWORD" "SIGNALS_API_TOKEN") }}
{{- fail (printf "extraEnv name %q is managed by the chart and cannot be overridden" $entry.name) }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-signals
  labels:
    app.kubernetes.io/name: signals
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: signals
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signals
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- /* #114: AKS workload identity needs the pod to carry
              azure.workload.identity/use: "true" so the webhook injects
              the projected federated token. */}}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Release.Name }}-signals
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup | default 10001 }}
        fsGroup: {{ .Values.securityContext.fsGroup | default 10001 }}
        fsGroupChangePolicy: {{ .Values.securityContext.fsGroupChangePolicy | default "OnRootMismatch" }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: signals
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.api.port }}
              name: api
              protocol: TCP
          env:
            - name: SIGNALS_ENV
              value: {{ .Values.env | quote }}
            {{- /* #114: the target (host/port/dbname/user/sslmode AND
                  auth_method + cloud params) is delivered through the
                  mounted signals.yaml `targets:` block, not env — the
                  collector only reads auth_method from YAML. Env target
                  vars are intentionally not set here to avoid a
                  duplicate target. */}}
            - name: SIGNALS_POLL_INTERVAL
              value: {{ .Values.collector.pollInterval | quote }}
            - name: SIGNALS_RETENTION_DAYS
              value: {{ .Values.collector.retentionDays | quote }}
            - name: SIGNALS_TARGET_TIMEOUT
              value: {{ .Values.collector.targetTimeout | quote }}
            - name: SIGNALS_QUERY_TIMEOUT
              value: {{ .Values.collector.queryTimeout | quote }}
            - name: SIGNALS_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.api.port }}"
            {{- /* #114: password source only for the default (password)
                  method. Token/secret methods are passwordless (FC005) —
                  no PG_PASSWORD is injected even if a secret name leaks
                  through values. The configmap renders password_env
                  under the same guard, so the two stay in lockstep. */}}
            {{- if and (not .Values.target.authMethod) .Values.target.passwordSecretName }}
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.target.passwordSecretName }}
                  key: {{ .Values.target.passwordSecretKey }}
            {{- end }}
            {{- /* #136: API bearer token from a managed Secret. When
                  tokenSecretName is set, the binary skips the
                  auto-generate path in cmd/signals/main.go and
                  uses the value from the Secret. The token never
                  lands in a ConfigMap or rendered manifest beyond
                  the Secret reference name. */ -}}
            {{- if .Values.api.tokenSecretName }}
            - name: SIGNALS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.tokenSecretName }}
                  key: {{ .Values.api.tokenSecretKey | default "token" }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/signals
              readOnly: true
            - name: data
              mountPath: /data
            {{- /* #114: operator-supplied mounts, e.g. a CA bundle for
                  sslmode: verify-full (point target.sslRootCertFile at
                  the mount path). */}}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-signals-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-signals-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

# Elevarq Signals Helm chart values

image:
  repository: ghcr.io/elevarq/signals
  tag: "1.1.0"
  pullPolicy: IfNotPresent

# PostgreSQL target configuration. Rendered into the mounted
# signals.yaml ConfigMap as a single `targets:` entry (the collector
# reads auth_method and the cloud parameters only from that block, not
# from env — internal/config/config.go). No target block is emitted
# until `host` is set.
target:
  host: ""           # Required: PostgreSQL hostname
  port: 5432
  dbname: postgres
  user: signals
  sslmode: prefer    # token methods (below) require verify-full (FC006)

  # Passwordless cloud auth (#93 credential-providers; recipe:
  # docs/database-connections.md). Leave authMethod empty for the
  # default password method. Token/secret methods are passwordless —
  # do NOT set passwordSecretName with them (FC005) — and require
  # sslmode: verify-full in every environment (FC006). The collector's
  # ambient cloud identity (IRSA / Pod Identity / Workload Identity)
  # mints the credential; see deploy/helm/signals/README.md for
  # per-platform values snippets.
  authMethod: ""     # "" | aws_rds_iam | azure_entra | gcp_cloudsql_iam | secret_store
  region: ""         # aws_rds_iam: optional (also read from AWS_REGION / IMDS)
  azureClientId: ""  # azure_entra: optional user-assigned MI disambiguation (also AZURE_CLIENT_ID)
  gcpImpersonateServiceAccount: ""  # gcp_cloudsql_iam: optional impersonation target
  secretRef: ""      # secret_store: cloud vault reference (NOT a secret — an ARN/URI/name)

  # verify-full needs a CA bundle. Mount it via extraVolumes /
  # extraVolumeMounts (below) and point this at the mounted path. In
  # `prod`, verify-ca/verify-full hard-require this (config.go prod-TLS gate).
  sslRootCertFile: ""

  # Password method only (authMethod empty). The Secret is referenced
  # by name; the password never lands in a ConfigMap or rendered
  # manifest beyond the Secret reference (injected as PG_PASSWORD).
  passwordSecretName: ""    # Kubernetes secret containing the password
  passwordSecretKey: password

# Collector settings
collector:
  pollInterval: 5m
  retentionDays: 30
  targetTimeout: 60s
  queryTimeout: 10s

# API settings
api:
  port: 8081
  # API bearer token for the control-plane endpoints
  # (pause/resume/reload/status/export/metrics). The binary
  # auto-generates a strong 32-byte token at startup when none is
  # configured, but production installs SHOULD supply one through
  # a Kubernetes Secret so the token survives restarts and rotation
  # is declarative.
  #
  # When `tokenSecretName` is set, the deployment injects the value
  # as `SIGNALS_API_TOKEN` via secretKeyRef — the token never
  # lands in a ConfigMap or rendered manifest beyond the Secret
  # reference name.
  #
  # Token strength (#135): tokens must be at least 32 characters
  # AND carry >= 8 distinct characters. Generate one with:
  #   kubectl create secret generic signals-api \
  #     --from-literal=token="$(openssl rand -base64 32)"
  tokenSecretName: ""        # Required for production deployments
  tokenSecretKey: token      # Defaults to `token`

  # Transport security (#67 / R113). The pod binds the API on
  # 0.0.0.0:<port>, so the bearer token and the full telemetry
  # /export cross the pod network. Protect that path with EITHER:
  #   (a) daemon-terminated TLS — set tls.enabled and mount a cert +
  #       key (the daemon reads SIGNALS_API_TLS_CERT_FILE /
  #       SIGNALS_API_TLS_KEY_FILE), OR
  #   (b) a service mesh / sidecar that terminates TLS, plus a
  #       restrictive networkPolicy (below).
  # Leaving both off ships a cleartext, network-exposed control plane;
  # the chart NOTES will warn about this on install.
  tls:
    enabled: false
    # When enabled, the operator is asserting TLS is terminated for
    # this listener — either by the daemon (mount a cert/key and set
    # the env vars in extraEnv) or by a mesh/sidecar in front of it.

# Environment. "dev" / "lab" tolerate weak operator-supplied API
# tokens with warnings; "prod" hard-fails on weak tokens at
# startup. Docs: docs/security/access-control.md.
env: dev

# ServiceAccount (#140). A dedicated SA per release is the
# production default — least-privilege identity binding + audit
# affordance. Disable only if your platform mandates a shared SA.
serviceAccount:
  create: true
  # Per-platform identity binding (#114). Examples:
  #   IRSA:        eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role>
  #   GKE WI:      iam.gke.io/gcp-service-account: <gsa>@<proj>.iam.gserviceaccount.com
  #   AKS WI:      azure.workload.identity/client-id: <client-id>
  #   EKS Pod ID:  (no annotation — the association is created out-of-band)
  annotations: {}

# Pod template labels (#114). AKS workload identity requires the POD
# to carry `azure.workload.identity/use: "true"` so the webhook injects
# the projected federated token. e.g.:
#   podLabels:
#     azure.workload.identity/use: "true"
podLabels: {}

# Additional non-secret environment variables for the Signals container.
# Secret values must use valueFrom.secretKeyRef; do not put credential values
# in Helm values or release history. Built-in SIGNALS_* variables managed by
# the chart cannot be overridden here. Example:
#   extraEnv:
#     - name: SIGNALS_API_TLS_CERT_FILE
#       value: /etc/ssl/signals/tls.crt
#     - name: SIGNALS_API_TLS_KEY_FILE
#       value: /etc/ssl/signals/tls.key
extraEnv: []

# Extra volumes / mounts (#114). Use to mount a CA bundle for
# sslmode: verify-full (set target.sslRootCertFile to the mount path),
# or any other operator-supplied file. No secrets in values — mount a
# Secret/ConfigMap by reference. e.g.:
#   extraVolumes:
#     - name: db-ca
#       secret:
#         secretName: db-ca-bundle
#   extraVolumeMounts:
#     - name: db-ca
#       mountPath: /etc/ssl/db
#       readOnly: true
extraVolumes: []
extraVolumeMounts: []

# NetworkPolicy (#140). Opt-in. When enabled, the policy denies
# all ingress + egress by default and explicitly allows:
#   - Egress to Postgres (operator-supplied CIDR + target.port)
#   - Egress to DNS (operator-supplied kube-DNS CIDR)
#   - Ingress from named pod selectors (typically the scraper /
#     control-plane caller)
#
# Setting `enabled: true` without populating
# `ingressPodSelectors` results in no ingress allowed — that's
# the conservative default; operators MUST list who can reach
# the API.
networkPolicy:
  enabled: false
  # ingressPodSelectors: list of label-maps that may reach the API
  # port. e.g.:
  #   - app.kubernetes.io/name: prometheus
  #   - app.kubernetes.io/name: grafana
  ingressPodSelectors: []
  # Postgres target CIDRs the daemon is permitted to reach. Use
  # /32 for a single host or your cluster's pod-network CIDR for
  # an in-cluster Postgres.
  targetCIDRs:
    - "0.0.0.0/0"   # placeholder; override with the actual target CIDR
  # Kube-DNS CIDR. Typical defaults below; override per cluster.
  kubeDNS:
    - "10.96.0.10/32"   # kube-system default; override for your cluster

# PodDisruptionBudget (#140). Opt-in. Protects the single replica
# during voluntary disruptions (kubectl drain, cluster-autoscaler
# scale-downs, version upgrades). For multi-replica HA, set
# `minAvailable: 1` and bump deployment replicas.
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 0

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Persistence
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  # Make dynamically provisioned persistent volumes writable by the non-root
  # process. OnRootMismatch avoids an unnecessary recursive ownership walk
  # when a retained volume already has the expected root directory group.
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  readOnlyRootFilesystem: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-arq-signals
  labels:
    app.kubernetes.io/name: arq-signals
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arq-signals
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arq-signals
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Release.Name }}-arq-signals
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup | default 10001 }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: arq-signals
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.api.port }}
              name: api
              protocol: TCP
          env:
            - name: ARQ_ENV
              value: {{ .Values.env | quote }}
            - name: ARQ_SIGNALS_TARGET_HOST
              value: {{ .Values.target.host | quote }}
            - name: ARQ_SIGNALS_TARGET_PORT
              value: {{ .Values.target.port | quote }}
            - name: ARQ_SIGNALS_TARGET_DBNAME
              value: {{ .Values.target.dbname | quote }}
            - name: ARQ_SIGNALS_TARGET_USER
              value: {{ .Values.target.user | quote }}
            - name: ARQ_SIGNALS_TARGET_SSLMODE
              value: {{ .Values.target.sslmode | quote }}
            - name: ARQ_SIGNALS_POLL_INTERVAL
              value: {{ .Values.collector.pollInterval | quote }}
            - name: ARQ_SIGNALS_RETENTION_DAYS
              value: {{ .Values.collector.retentionDays | quote }}
            - name: ARQ_SIGNALS_TARGET_TIMEOUT
              value: {{ .Values.collector.targetTimeout | quote }}
            - name: ARQ_SIGNALS_QUERY_TIMEOUT
              value: {{ .Values.collector.queryTimeout | quote }}
            - name: ARQ_SIGNALS_LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.api.port }}"
            {{- if .Values.target.passwordSecretName }}
            - name: ARQ_SIGNALS_TARGET_PASSWORD_ENV
              value: PG_PASSWORD
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.target.passwordSecretName }}
                  key: {{ .Values.target.passwordSecretKey }}
            {{- end }}
            {{- /* #136: API bearer token from a managed Secret. When
                  tokenSecretName is set, the binary skips the
                  auto-generate path in cmd/arq-signals/main.go and
                  uses the value from the Secret. The token never
                  lands in a ConfigMap or rendered manifest beyond
                  the Secret reference name. */ -}}
            {{- if .Values.api.tokenSecretName }}
            - name: ARQ_SIGNALS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.tokenSecretName }}
                  key: {{ .Values.api.tokenSecretKey | default "token" }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/arq
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-arq-signals-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-arq-signals-data
          {{- else }}
          emptyDir: {}
          {{- end }}

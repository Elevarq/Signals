apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-arq-signals
  labels:
    app.kubernetes.io/name: arq-signals
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    app.kubernetes.io/name: arq-signals
    app.kubernetes.io/instance: {{ .Release.Name }}

{{- /*
  #140 — PersistentVolumeClaim for the SQLite snapshot store.

  The deployment volume mount references `<release>-arq-signals-data`
  but there was no PVC template until #140. Without this manifest,
  helm-install on a cluster with no operator-managed PVC failed at
  pod scheduling time. Production-readiness requires the chart
  render a complete deployment without hand-edited manifests.

  Toggleable via `persistence.enabled`. When disabled, the
  deployment falls back to an emptyDir volume (data lost on pod
  restart) — acceptable for evaluation, never for production.
*/}}
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-arq-signals-data
  labels:
    app.kubernetes.io/name: arq-signals
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "1Gi" }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}

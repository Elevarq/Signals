AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Elevarq Signals — passwordless onboarding for Amazon RDS / Aurora PostgreSQL
  (#111). Provisions the collector's IAM identity with a minimal rds-db:connect
  policy scoped to one DB user, and runs the collector on EC2 pre-wired for
  auth_method: aws_rds_iam over verify-full TLS. No secrets are stored — the
  credential is a short-lived RDS IAM token minted from this identity at
  connect time (INV001/INV002). The DB-side grant (GRANT rds_iam / pg_monitor)
  is a one-time SQL step; see ../README.md.

Parameters:
  DbHost:
    Type: String
    Description: RDS/Aurora endpoint hostname.
  DbPort:
    Type: Number
    Default: 5432
  DbName:
    Type: String
    Description: Database name to connect to.
  DbUser:
    Type: String
    Default: signals
    Description: PostgreSQL role granted rds_iam + pg_monitor.
  DbResourceId:
    Type: String
    Description: >-
      RDS instance/cluster DbiResourceId (e.g. db-ABCDEFGH...), NOT the DB
      identifier. Scopes the rds-db:connect policy.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the collector (must route to the RDS instance).
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: Security group(s) — must allow egress to the DB on DbPort.
  InstanceType:
    Type: String
    Default: t3.small
  ImageUri:
    Type: String
    Default: ghcr.io/elevarq/signals:1.0.0
    Description: Elevarq Signals container image (pinned tag).
  Env:
    Type: String
    Default: prod
    AllowedValues: [prod, lab, dev]
  PollInterval:
    Type: String
    Default: 5m
  LatestAl2023Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  CollectorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      # Session Manager / Run Command access for the operator-gated verify
      # steps — the template provisions no SSH key pair.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: rds-iam-connect
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: RDSIAMConnect
                Effect: Allow
                Action: rds-db:connect
                Resource: !Sub "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DbResourceId}/${DbUser}"

  CollectorInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref CollectorRole

  # IMDSv2 is enforced below via MetadataOptions.HttpTokens=required. Trivy's
  # CloudFormation adapter for AVD-AWS-0028 does not read MetadataOptions (the
  # equivalent Terraform in ../terraform passes the same check), so this is a
  # false positive. Remove when Trivy's CFN adapter reads MetadataOptions.
  # trivy:ignore:AVD-AWS-0028
  CollectorInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAl2023Ami
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds: !Ref SecurityGroupIds
      IamInstanceProfile: !Ref CollectorInstanceProfile
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            Encrypted: true
            VolumeSize: 20
      Tags:
        - Key: Name
          Value: signals-collector
        - Key: app.kubernetes.io/name
          Value: signals
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          dnf install -y docker
          systemctl enable --now docker
          # AL2023 ships the SSM agent; ensure it is running so the operator
          # can reach the instance via Session Manager / Run Command (no SSH
          # key pair).
          systemctl enable --now amazon-ssm-agent || true
          mkdir -p /etc/signals
          curl -fsSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem \
            -o /etc/signals/rds-ca.pem
          cat > /etc/signals/signals.yaml <<'YAML'
          env: ${Env}
          signals:
            poll_interval: ${PollInterval}
          database:
            path: /data/signals.db
            wal: true
          api:
            listen_addr: "127.0.0.1:8081"
          targets:
            - name: ${DbName}-rds
              host: ${DbHost}
              port: ${DbPort}
              dbname: ${DbName}
              user: ${DbUser}
              auth_method: aws_rds_iam
              region: ${AWS::Region}
              sslmode: verify-full
              sslrootcert_file: /etc/signals/rds-ca.pem
          YAML
          # The config carries no secret; make the bind-mounted files
          # world-readable so the non-root container (uid 10001) can read them.
          chmod 0644 /etc/signals/signals.yaml /etc/signals/rds-ca.pem
          # Mint a strong control-plane API token. It is passed to the
          # container via the environment (mirrors the Helm SIGNALS_API_TOKEN
          # path) and stored root-only, outside the bind mount, so the operator
          # can authenticate the verify step — it is never written into config.
          SIGNALS_API_TOKEN="$(openssl rand -hex 32)"
          umask 077
          printf '%s\n' "$SIGNALS_API_TOKEN" > /root/signals-api-token
          # ENTRYPOINT is `tini --` with CMD `signals`; the `signals` arg below
          # is required, else the image args replace CMD and tini execs --config.
          docker run -d --name signals --restart=always \
            -e SIGNALS_API_TOKEN="$SIGNALS_API_TOKEN" \
            -v /etc/signals:/etc/signals:ro \
            -v signals-data:/data \
            -p 127.0.0.1:8081:8081 \
            ${ImageUri} signals --config /etc/signals/signals.yaml

Outputs:
  CollectorRoleArn:
    Description: IAM role the collector runs under.
    Value: !GetAtt CollectorRole.Arn
  RdsConnectResourceArn:
    Description: The rds-db:connect resource ARN scoped to DbUser on this instance.
    Value: !Sub "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${DbResourceId}/${DbUser}"
  InstanceId:
    Description: Collector EC2 instance id.
    Value: !Ref CollectorInstance
